services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - chatdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
  api:
    profiles: [full]
    build: ./api
    image: simple-ai-chatbot-api:local
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      USAGE_HASH_SECRET: ${USAGE_HASH_SECRET}
      AGENT_URL: ${AGENT_URL:-http://agent:8080}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      SIGNUP_OPEN: ${SIGNUP_OPEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAGIC_LINK_FROM: ${MAGIC_LINK_FROM:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started
  agent:
    profiles: [full]
    build: ./agent
    image: simple-ai-chatbot-agent:local
    env_file:
      - path: agent/.env
        required: false
    ports:
      - "8081:8080"
  web:
    profiles: [full]
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    image: simple-ai-chatbot-web:local
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  chatdata: