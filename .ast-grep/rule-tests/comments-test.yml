id: comment-too-long-go
valid:
  - "package p\n// short and fine\nvar x int"
  - "package p\n// see https://example.com/a/very/long/url/well/over/the/eighty/char/limit/yes\nvar x int"
invalid:
  - "package p\n// this standalone comment is intentionally way over eighty characters to trip cap\nvar x int"
---
id: multiline-comment-go
valid:
  - "package p\n/* single line block */\nvar x int"
invalid:
  - "package p\n/*\nmulti\nline\n*/\nvar x int"
---
id: comment-too-long-typescript
valid:
  - "// short ok\nexport const a = 1;"
  - "const u = 'http://localhost:8080'; // string trap is not a comment"
invalid:
  - "// this standalone comment is intentionally way over eighty characters to trip the cap\nexport const a = 1;"
---
id: multiline-comment-css
valid:
  - "/* single line ok */\n.a { color: red; }"
invalid:
  - "/*\nmulti line css\n*/\n.a { color: red; }"
---
id: comment-too-long-python
valid:
  - "# short and fine\nx = 1"
  - "# see https://example.com/a/very/long/url/well/over/the/eighty/char/limit/ok\nx = 1"
  - "x = 1  # type: ignore this pragma line is intentionally longer than eighty chars ok\n"
invalid:
  - "# this standalone python comment is intentionally way over eighty characters to trip cap\nx = 1"
