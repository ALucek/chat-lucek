name: rotate-jwt
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # WIF auth to GCP

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  rotate-jwt:
    runs-on: ubuntu-latest
    environment: production
    env:
      REGION: ${{ vars.GCP_REGION }}
      DOMAIN: ${{ vars.DOMAIN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Rotate JWT secret and restart api
        run: |
          set -euo pipefail
          secret=$(openssl rand -base64 48)
          ver=$(printf '%s' "$secret" | gcloud secrets versions add jwt-secret \
            --data-file=- --format='value(name)')
          ver="${ver##*/}"
          echo "added jwt-secret version $ver"
          gcloud run services update chat-api --region="$REGION" \
            --update-secrets "JWT_SECRET=jwt-secret:$ver"

      - name: Health check
        run: |
          set -euo pipefail
          root=$(curl -s -o /dev/null -w '%{http_code}' "https://$DOMAIN")
          ready=$(curl -s -o /dev/null -w '%{http_code}' "https://$DOMAIN/readyz")
          me=$(curl -s -o /dev/null -w '%{http_code}' "https://$DOMAIN/api/me")
          echo "root=$root readyz=$ready api/me=$me"
          test "$root" = "200" || { echo "web root $root"; exit 1; }
          test "$ready" = "200" || { echo "readyz $ready"; exit 1; }
          test "$me" = "401" || { echo "api/me $me"; exit 1; }
