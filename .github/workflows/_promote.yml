name: _promote
on:
  workflow_call:
    inputs:
      promote_api:
        type: boolean
        required: true
      promote_web:
        type: boolean
        required: true
      promote_agent:
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # WIF auth to GCP
    env:
      REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
          # OIDC token to reach the IAP-gated dev host (audience = client id).
          token_format: id_token
          id_token_audience: ${{ vars.IAP_OAUTH_CLIENT_ID }}
          id_token_include_email: true
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      # Promote a service only if its dev (cand) revision differs from live.
      - name: Plan promotions
        id: plan
        run: |
          set -euo pipefail
          ANY=false
          plan() {
            svc="$1"; req="$2"
            if [ "$req" != "true" ]; then echo "flip_$svc=false" >> "$GITHUB_OUTPUT"; return; fi
            j=$(gcloud run services describe "chat-$svc" --region "$REGION" --format=json)
            cand=$(echo "$j" | jq -r '[.status.traffic[]|select(.tag=="cand")|.revisionName][0] // empty')
            live=$(echo "$j" | jq -r '[.status.traffic[]|select(.percent==100)|.revisionName][0] // empty')
            if [ -z "$cand" ] || [ "$cand" = "$live" ]; then
              echo "$svc: nothing to promote (cand=${cand:-none} live=${live:-none})"
              echo "flip_$svc=false" >> "$GITHUB_OUTPUT"; return
            fi
            echo "$svc: ${live:-none} -> $cand"
            # prev_ is the serving revision, restored if this promote fails.
            {
              echo "flip_$svc=true"
              echo "rev_$svc=$cand"
              echo "prev_$svc=$live"
            } >> "$GITHUB_OUTPUT"
            ANY=true
          }
          plan api "${{ inputs.promote_api }}"
          plan web "${{ inputs.promote_web }}"
          plan agent "${{ inputs.promote_agent }}"
          echo "any=$ANY" >> "$GITHUB_OUTPUT"
      # Re-verify the revisions being promoted on the dev host before flipping.
      - name: Verify candidates on the dev host
        if: ${{ steps.plan.outputs.flip_api == 'true' || steps.plan.outputs.flip_web == 'true' || steps.plan.outputs.flip_agent == 'true' }}
        env:
          TOKEN: ${{ steps.auth.outputs.id_token }}
          DEV: https://dev.${{ vars.DOMAIN }}
        run: |
          set -euo pipefail
          if [ "${{ steps.plan.outputs.flip_api }}" = "true" ]; then
            ready=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$DEV/readyz")
            test "$ready" = "200" || { echo "api candidate /readyz -> $ready"; exit 1; }
            me=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$DEV/api/me")
            test "$me" = "401" || { echo "api candidate /api/me -> $me"; exit 1; }
          fi
          if [ "${{ steps.plan.outputs.flip_web }}" = "true" ]; then
            web=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$DEV/")
            test "$web" = "200" || { echo "web candidate / -> $web"; exit 1; }
          fi
          if [ "${{ steps.plan.outputs.flip_agent }}" = "true" ]; then
            az=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$DEV/agentz")
            test "$az" = "200" || { echo "agent candidate /agentz -> $az"; exit 1; }
          fi
      # Flip prod traffic to the dev revision; old revision stays for rollback.
      - name: Promote agent
        if: ${{ steps.plan.outputs.flip_agent == 'true' }}
        run: gcloud run services update-traffic chat-agent --region "$REGION" --to-revisions "${{ steps.plan.outputs.rev_agent }}=100"
      - name: Promote api
        if: ${{ steps.plan.outputs.flip_api == 'true' }}
        run: gcloud run services update-traffic chat-api --region "$REGION" --to-revisions "${{ steps.plan.outputs.rev_api }}=100"
      - name: Promote web
        if: ${{ steps.plan.outputs.flip_web == 'true' }}
        run: gcloud run services update-traffic chat-web --region "$REGION" --to-revisions "${{ steps.plan.outputs.rev_web }}=100"
      - name: Post-flip prod smoke
        if: ${{ steps.plan.outputs.any == 'true' }}
        run: |
          set -euo pipefail
          web=$(curl -fsS -o /dev/null -w '%{http_code}' "https://${{ vars.DOMAIN }}")
          test "$web" = "200" || { echo "web returned $web"; exit 1; }
          ready=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.DOMAIN }}/readyz")
          test "$ready" = "200" || { echo "/readyz returned $ready"; exit 1; }
          api=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.DOMAIN }}/api/me")
          test "$api" = "401" || { echo "api /api/me returned $api"; exit 1; }
      - name: Nothing to promote
        if: ${{ steps.plan.outputs.any != 'true' }}
        run: echo "dev already matches prod; nothing to promote"
      # On failure, restore each flipped service to its pre-promote revision.
      - name: Restore prod on failure
        if: ${{ failure() && steps.plan.outputs.any == 'true' }}
        run: |
          set -uo pipefail
          restore() {
            svc="$1"; flip="$2"; prev="$3"
            [ "$flip" = "true" ] && [ -n "$prev" ] || return 0
            echo "restoring chat-$svc -> $prev"
            gcloud run services update-traffic "chat-$svc" --region "$REGION" \
              --to-revisions "$prev=100" || echo "WARNING: restore of chat-$svc failed"
          }
          restore agent "${{ steps.plan.outputs.flip_agent }}" "${{ steps.plan.outputs.prev_agent }}"
          restore api "${{ steps.plan.outputs.flip_api }}" "${{ steps.plan.outputs.prev_api }}"
          restore web "${{ steps.plan.outputs.flip_web }}" "${{ steps.plan.outputs.prev_web }}"
