name: deploy
on:
  workflow_run:
    workflows: [test]
    types: [completed]

permissions:
  contents: read
  id-token: write # ceiling for the called _deploy workflow (WIF)
  attestations: write # ceiling for the called _deploy workflow (SBOM/provenance)

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    # Deploy only when tests passed on a push to main (never on PR / fork runs).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.diff.outputs.api }}
      web: ${{ steps.diff.outputs.web }}
      agent: ${{ steps.diff.outputs.agent }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      # main only takes squash-merged PRs, so each push is one commit — HEAD^ is the prior main tip.
      - name: Detect changed services
        id: diff
        run: |
          changed=$(git diff --name-only HEAD^ HEAD)
          echo "$changed"
          api=false
          web=false
          agent=false
          if grep -qE '^api/' <<<"$changed"; then api=true; fi
          if grep -qE '^web/' <<<"$changed"; then web=true; fi
          if grep -qE '^agent/' <<<"$changed"; then agent=true; fi
          {
            echo "api=$api"
            echo "web=$web"
            echo "agent=$agent"
          } >> "$GITHUB_OUTPUT"

  deploy:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/_deploy.yml
    with:
      sha: ${{ github.event.workflow_run.head_sha }}
      deploy_api: ${{ needs.changes.outputs.api == 'true' }}
      deploy_web: ${{ needs.changes.outputs.web == 'true' }}
      deploy_agent: ${{ needs.changes.outputs.agent == 'true' }}
    secrets: inherit
