name: test
on: [push, pull_request]
permissions:
  contents: read
jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api/go.mod
      # Runs gofmt check, go vet, go build, and go test — same as `make api-check` locally.
      - run: make api-check
  actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api/go.mod
      # Lints all workflow YAML + shellcheck on run: blocks — same as `make actions-check`.
      - run: make actions-check
  agent-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: make agent-install
      # Runs ruff format check, ruff lint, and pytest — same as `make agent-check`.
      - run: make agent-check
  web-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: make web-install
      # Runs prettier check, eslint, tsc, vitest, and next build — same as `make web-check` locally.
      - run: make web-check
      - run: make comment-check
      - run: make comment-check-test
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: chat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d chat"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: app
      DB_PASSWORD: devpassword
      DB_NAME: chat
      PORT: '8080'
      JWT_SECRET: test-secret-at-least-32-bytes-long-xx
      OPENROUTER_API_KEY: test-key
      GOOGLE_CLIENT_ID: e2e-dummy
      GOOGLE_AUTH_FAKE: '1'
      SIGNUP_OPEN: 'true'
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: e2e-dummy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api/go.mod
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: make migrate-up
      - run: make web-install
      - run: cd web && pnpm exec playwright install --with-deps chromium
      - run: make e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: web/playwright-report/